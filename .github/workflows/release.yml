name: release

on:
  push:
    tags:
      - '*'

permissions:
  contents: write

jobs:
  validate:
    name: Validate Tag
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

  build:
    uses: ./.github/workflows/build_reusable.yml
    with:
      release: true

  prepare:
    name: Prepare Release
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: write

    outputs:
      publish_github: ${{ steps.check.outputs.publish_github }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Prepare git-cliff
        run: |
          REPO_URL="https://github.com/${{ github.repository }}"
          sed -i "s|%%%repo_url%%%|${REPO_URL}|g" cliff.toml

      - name: Generate changelog with git-cliff
        uses: orhun/git-cliff-action@v4
        with:
          args: --latest --strip header --output CHANGELOG.md
          version: 'v2.10.1'

      - name: Upload changelog
        uses: actions/upload-artifact@v4
        with:
          name: changelog
          path: CHANGELOG.md

  github-release:
    name: Release to GitHub
    runs-on: ubuntu-latest
    needs: prepare
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: build-artifacts
          path: tmp/

      - name: Download changelog
        uses: actions/download-artifact@v4
        with:
          name: changelog
          path: .

      - name: Create or update GitHub release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${GITHUB_REF_NAME}"
          echo "Creating or updating release for $TAG"
          # Try to create the release first
          if ! gh release create "$TAG" \
            --title "$TAG" \
            --notes-file CHANGELOG.md \
            --latest \
            --verify-tag \
            ./build/libs/$TAG/*; then

            echo "Release already exists. Updating existing release..."
            mv tmp/*.zip tmp/herobrine-datapack-$TAG.zip

            # Update release notes and mark as latest
            gh release edit "$TAG" \
              --title "$TAG" \
              --notes-file CHANGELOG.md \
              --latest

            # Re-upload artifacts (delete first to avoid duplicates)
            for FILE in tmp/; do
              NAME=$(basename "$FILE")
              gh release delete-asset "$TAG" "$NAME" -y || true
              gh release upload "$TAG" "$FILE" --clobber
            done
          fi